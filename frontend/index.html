<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <title>Analizador IA PRO</title>
  <link rel="stylesheet" href="styles.css">
</head>
<body>

<div class="container">

  <div class="topbar">
    <h1>🤖 Analizador IA</h1>
    <button onclick="toggleModo()">🌙 / ☀️</button>
  </div>

  <div class="editor">
    <textarea id="codigo" placeholder="Pega tu código aquí..."></textarea>
  </div>

  <div class="buttons">
    <button onclick="analizarCodigo()">Analizar</button>
    <button onclick="limpiar()">Limpiar</button>
  </div>

  <div id="loading" class="hidden">⏳ Analizando...</div>

  <div class="result-box">
    <h2>Resultado</h2>
    <div id="resultado"></div>
  </div>

  <div class="history-box">
    <h2>Historial</h2>
    <ul id="historial"></ul>
  </div>

</div>

<script src="script.js"></script>
</body>
</html>
